<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a5cb8">
  <title>業務改善ナビ</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Business Improvement</p>
      <h1>業務改善ナビ</h1>
    </div>
    <button id="resetBtn" class="icon-btn" type="button" aria-label="リセット">↺</button>
  </header>

  <main>
    <section class="panel focus-panel">
      <label for="taskInput">改善したい業務</label>
      <textarea id="taskInput" rows="4" placeholder="例：月次報告書の集計に時間がかかる"></textarea>
      <div class="actions">
        <button id="classifyBtn" type="button">分類する</button>
        <button id="timerBtn" type="button" class="secondary">5分で整理</button>
      </div>
    </section>

    <section class="tabs" aria-label="改善メニュー">
      <button class="tab active" type="button" data-tab="input">入力</button>
      <button class="tab" type="button" data-tab="plan">提案</button>
      <button class="tab" type="button" data-tab="reward">詳細</button>
    </section>

    <section id="inputTab" class="tab-panel active">
      <div class="grid">
        <article class="mini-card">
          <span class="label">分類</span>
          <strong id="categoryText">未分類</strong>
        </article>
        <article class="mini-card">
          <span class="label">優先度</span>
          <strong id="priorityText">-</strong>
        </article>
        <article class="mini-card">
          <span class="label">整理タイマー</span>
          <strong id="timerText">05:00</strong>
        </article>
      </div>
    </section>

    <section id="planTab" class="tab-panel">
      <ol id="planList" class="plan-list"></ol>
    </section>

    <section id="rewardTab" class="tab-panel">
      <div class="unlock-box">
        <div>
          <span class="label">詳細プラン</span>
          <h2 id="unlockTitle">広告視聴で24時間解放</h2>
        </div>
        <button id="rewardBtn" type="button">解放する</button>
      </div>
      <div id="detailPlan" class="detail-plan locked"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="主要操作">
    <button type="button" data-tab-target="input">入力</button>
    <button type="button" data-tab-target="plan">提案</button>
    <button type="button" data-tab-target="reward">詳細</button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="./app.js" type="module"></script>
</body>
</html>
